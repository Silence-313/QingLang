<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 · 青朗法治</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/workbench.css}">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<!-- 原 header 部分替换为 -->
<div id="header">
  <div class="back-btn-container">
    <button id="backToMainBtn" class="back-btn">← 返回指挥中心</button>
  </div>
  <h1 style="cursor:pointer; flex: 1; text-align: center;" onclick="location.href='/'">
    <em>青朗法治</em> · 工作台
  </h1>
</div>

<div class="workbench-container">
  <!-- 三栏布局 - 只包含三个栏目 -->
  <div class="workbench-layout">
    <!-- 左侧：待办案件列表 -->
    <div class="workbench-left">
      <div class="workbench-card">
        <div class="card-header">📋 待办案件</div>

        <!-- 操作按钮栏 -->
        <div class="pending-actions">
          <button id="showPendingDialogBtn" class="action-btn">
            <span>➕</span> 新建待办
          </button>
        </div>

        <div id="pendingCaseList" class="pending-list">
          <div class="loading-placeholder">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 中间：案件详情（可编辑） -->
    <!-- 中间：案件详情（可编辑） -->
    <div class="workbench-center">
      <div class="workbench-card">
        <div class="card-header">
          <span>📝 案件详情编辑</span>
          <div class="card-actions">
            <button id="completeTaskBtn" class="btn-success">✅ 处理完成</button>
            <button id="saveCaseBtn" class="btn-primary">保存</button>
            <button id="cancelEditBtn" class="btn-secondary">取消</button>
          </div>
        </div>
        <div id="caseEditContainer" class="case-edit-container">
          <div class="empty-placeholder">← 请从左侧选择待办案件</div>
        </div>
      </div>
    </div>

    <!-- 右侧：智能问答 -->
    <div class="workbench-right">
      <div class="workbench-card chat-card">
        <div class="card-header">
          <div class="chat-header-left">
            <button id="toggleHistoryBtn" class="menu-btn" title="历史记录">☰</button>
            <span>🤖 智能法律助手</span>
          </div>
          <button id="newChatBtn" class="new-chat-btn" title="新对话">➕</button>
        </div>
        <div id="chatMessages" class="chat-messages">
          <div class="chat-message assistant">
            <div class="message-content">你好！我是青朗法治智能助手，可以回答涉外案件相关的法律问题。请问有什么可以帮助你的？</div>
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="输入法律问题..." autocomplete="off" />
          <button id="sendChatBtn">发送</button>
        </div>
        <div id="chatStatus" class="chat-status"></div>
      </div>
    </div>
  </div><!-- workbench-layout 结束 -->
  <!-- 模态框：新建待办 -->
  <!-- 模态框：新建待办（改为 AI 智能提取） -->
  <div id="pendingDialog" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <span class="modal-title">✨ AI 智能提取案件信息</span>
        <button class="modal-close" id="closePendingDialogBtn">&times;</button>
      </div>
      <div class="modal-body" id="pendingDialogBody">
        <p style="color: #8ab3d7; margin-bottom: 12px;">请输入案件描述文本，AI 将自动提取结构化信息并创建案件记录。</p>
        <textarea id="caseDescriptionInput" placeholder="请输入案件描述文本，或上传文件自动填充..."
                  style="width: 100%; height: 200px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(80,160,255,0.3); border-radius: 4px; color: #fff; font-size: 14px; resize: vertical; outline: none;"></textarea>
        <div class="file-upload-area">
          <label for="caseFileInput" class="file-upload-label">
            <span>📎 上传文件 (PDF/DOCX/TXT)</span>
            <input type="file" id="caseFileInput" accept=".pdf,.docx,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" style="display:none;" />
          </label>
          <span id="uploadStatus" style="margin-left: 12px; color: #5ab4ff; font-size: 13px;"></span>
        </div>
        <div id="extractStatus" style="margin-top: 12px; color: #5ab4ff; font-size: 13px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelPendingDialogBtn">取消</button>
        <button class="btn-primary" id="confirmPendingDialogBtn">开始提取</button>
      </div>
    </div>
  </div>

  <!-- 历史记录侧边栏 -->
  <div id="historySidebar" class="history-sidebar">
    <div class="sidebar-header">
      <span>📜 对话历史</span>
      <button id="closeHistoryBtn" class="close-btn">&times;</button>
    </div>
    <div class="sidebar-content" id="historyList">
      <div class="loading-placeholder">加载中...</div>
    </div>
  </div>

  <!-- 侧边栏遮罩层 -->
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
</div><!-- workbench-container 结束 -->

<script th:src="@{/js/workbench.js}"></script>

</body>
</html>
