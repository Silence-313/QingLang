<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青朗法治 - 3D 业务指挥中心</title>
    <!-- 第三方库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <!-- 独立样式文件 -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- 顶部标题栏：保持纯粹 -->
<div id="header">
    <h1><em>青朗法治</em> · 涉外案件区域分布</h1>
</div>

<!-- 新增：中间搜索层 -->
<!-- 在 main.html 中找到 nav-section 部分，替换为以下内容 -->
<div class="nav-section">
    <!-- 左侧：工作台按钮 -->
    <div class="nav-left">
        <a th:href="@{/workbench}" class="workbench-nav-btn">
            <span class="btn-icon">⚙️</span> 工作台
        </a>
    </div>

    <!-- 右侧：搜索容器 -->
    <div class="search-container">
        <input type="text" id="caseSearchInput" placeholder="输入案件编号、当事人或法院关键词..." autocomplete="off" />
        <button type="button" onclick="performNavigationSearch()">搜索</button>
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
</div>

<div class="page-wrapper">
    <!-- 上部区域：3D地图容器 -->
    <div class="top-section">
        <div class="left-data-panel">
            <div class="side-box">
                <div class="side-title">核心业务指标</div>
                <div class="indicator-grid">
                    <div class="ind-item">
                        <span class="ind-label">年度案件总数</span>
                        <span class="ind-val" id="total-case-count">0</span>
                    </div>
                    <div class="ind-item">
                        <span class="ind-label">卷宗总页数</span>
                        <span class="ind-val" id="total-page-count">0</span>
                    </div>
                </div>
            </div>

            <div class="side-box">
                <div class="side-title">适用法律/条约占比</div>
                <div id="law-distribution-chart" style="width: 100%; height: 180px;"></div>
            </div>

            <div class="side-box">
                <div class="side-title">当事国籍 Top 5</div>
                <div id="country-rank-list" class="rank-list">
                </div>
            </div>
        </div>
        <div id="map-container">
            <div id="map"></div>
            <!-- 悬浮信息面板 -->
            <div class="info-panel">
                <div class="panel-name" id="pName">全国概览</div>
                <div class="row"><span class="lbl">案件数量</span><span class="val" id="pCases">—</span></div>
                <div class="row"><span class="lbl">涉外风险</span><span class="val" id="pLevel">—</span></div>
                <div class="row"><span class="lbl">占全国比</span><span class="val" id="pRatio">—</span></div>
            </div>
        </div>
    </div>

    <!-- 下部区域：业务明细数据区 -->
    <div class="bottom-section">
        <!-- 案由筛选栏（横向滚动按钮） -->
        <div class="reason-filter-bar">
            <div class="reason-buttons-wrapper" id="reasonButtonsWrapper">
                <div class="reason-buttons" id="reasonButtons">
                    <!-- 动态生成的按钮会放在这里 -->
                </div>
            </div>
        </div>

        <div class="case-columns-container">
            <!-- 刑事列 -->
            <div class="case-column">
                <div class="column-header">刑事案件</div>
                <div id="list-刑事" class="case-list"></div>
            </div>
            <!-- 民事列 -->
            <div class="case-column">
                <div class="column-header">民事案件</div>
                <div id="list-民事" class="case-list"></div>
            </div>
            <!-- 行政列 -->
            <div class="case-column">
                <div class="column-header">行政案件</div>
                <div id="list-行政" class="case-list"></div>
            </div>
            <!-- 公益诉讼列 -->
            <div class="case-column">
                <div class="column-header">公益诉讼</div>
                <div id="list-公益诉讼" class="case-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- 独立脚本文件 -->
<script th:src="@{/js/main.js}"></script>
</body>
</html>
