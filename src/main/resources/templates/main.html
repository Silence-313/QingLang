<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青朗法治 - 3D 业务指挥中心</title>
    <!-- 第三方库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <!-- 独立样式文件 -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<!-- 顶部标题栏：保持纯粹 -->
<div id="header">
    <h1><em>青朗法治</em> · 涉外案件区域分布</h1>
</div>

<!-- 新增：中间搜索层 -->
<div class="nav-section">
    <div class="search-container">
        <input type="text" id="caseSearchInput" placeholder="输入案件编号、当事人或法院关键词..." autocomplete="off" />
        <button type="button" onclick="performNavigationSearch()">搜索</button>
        <!-- 搜索建议下拉列表 -->
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
</div>

<div class="page-wrapper">
    <!-- 上部区域：3D地图容器 -->
    <div class="top-section">
        <div id="map-container">
            <div id="map"></div>
            <!-- 悬浮信息面板 -->
            <div class="info-panel">
                <div class="panel-name" id="pName">全国概览</div>
                <div class="row"><span class="lbl">案件数量</span><span class="val" id="pCases">—</span></div>
                <div class="row"><span class="lbl">涉外风险</span><span class="val" id="pLevel">—</span></div>
                <div class="row"><span class="lbl">占全国比</span><span class="val" id="pRatio">—</span></div>
            </div>
        </div>
    </div>

    <!-- 下部区域：业务明细数据区 -->
    <div class="bottom-section">
        <div class="case-columns-container">
            <!-- 刑事列 -->
            <div class="case-column">
                <div class="column-header">刑事案件</div>
                <div id="list-刑事" class="case-list"></div>
            </div>
            <!-- 民事列 -->
            <div class="case-column">
                <div class="column-header">民事案件</div>
                <div id="list-民事" class="case-list"></div>
            </div>
            <!-- 行政列 -->
            <div class="case-column">
                <div class="column-header">行政案件</div>
                <div id="list-行政" class="case-list"></div>
            </div>
            <!-- 公益诉讼列 -->
            <div class="case-column">
                <div class="column-header">公益诉讼</div>
                <div id="list-公益诉讼" class="case-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- 独立脚本文件 -->
<script th:src="@{/js/main.js}"></script>
</body>
</html>
