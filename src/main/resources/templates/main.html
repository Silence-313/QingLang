<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青朗法治 - 3D 业务指挥中心</title>
    <!-- 第三方库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 样式文件 -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <!-- 引入 workbench 样式用于右侧助手 -->
    <link rel="stylesheet" th:href="@{/css/workbench.css}">
</head>
<body>
<div id="header">
    <h1><em>青朗法治</em> · 涉外案件区域分布</h1>
</div>

<div class="nav-section">
    <div class="nav-left">
        <a th:href="@{/workbench}" class="workbench-nav-btn">
            <span class="btn-icon">⚙️</span> 工作台
        </a>
    </div>
    <div class="search-container">
        <input type="text" id="caseSearchInput" placeholder="输入案件编号、当事人或法院关键词..." autocomplete="off" />
        <button type="button" onclick="performNavigationSearch()">搜索</button>
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
</div>

<div class="case-type-bar">
    <button class="case-type-btn" data-type="刑事">⚖️ 刑事案件</button>
    <button class="case-type-btn" data-type="民事">📄 民事案件</button>
    <button class="case-type-btn" data-type="行政">🏛️ 行政案件</button>
    <button class="case-type-btn" data-type="公益诉讼">🌿 公益诉讼</button>
</div>

<div class="page-wrapper">
    <!-- 主体区域：左侧地图 + 右侧助手 -->
    <div class="main-split-layout">
        <!-- 左侧：地图及左侧数据面板 -->
        <div class="map-area">
            <div class="left-data-panel">
                <div class="side-box">
                    <div class="side-title">核心业务指标</div>
                    <div class="indicator-grid">
                        <div class="ind-item">
                            <span class="ind-label">年度案件总数</span>
                            <span class="ind-val" id="total-case-count">0</span>
                        </div>
                        <div class="ind-item">
                            <span class="ind-label">卷宗总页数</span>
                            <span class="ind-val" id="total-page-count">0</span>
                        </div>
                    </div>
                </div>
                <div class="side-box">
                    <div class="side-title">适用法律/条约占比</div>
                    <div id="law-distribution-chart" style="width: 100%; height: 180px;"></div>
                </div>
                <div class="side-box">
                    <div class="side-title">当事国籍 Top 5</div>
                    <div id="country-rank-list" class="rank-list"></div>
                </div>
            </div>
            <div id="map-container">
                <button id="openFullscreenModalBtn" class="map-corner-btn" title="打开全屏分析面板">📊 数据对比分析</button>
                <div id="map"></div>
                <div class="info-panel">
                    <!-- 地区名称 -->
                    <div class="panel-name" id="pName">全国概览</div>

                    <!-- 案件总数 -->
                    <div class="panel-section">
                        <div class="panel-label">📊 案件总数</div>
                        <div class="panel-value" id="pTotalCases">0</div>
                    </div>

                    <!-- 案件类型占比（四个环形图或简单列表，这里用简洁百分比条） -->
                    <div class="panel-section">
                        <div class="panel-label">⚖️ 案件类型占比</div>
                        <div id="pTypeStats" class="panel-stats-list"></div>
                    </div>

                    <!-- 案由占比（前四） -->
                    <div class="panel-section">
                        <div class="panel-label">📌 监督场景</div>
                        <div id="pReasonStats" class="panel-stats-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：智能法律助手 -->
        <div class="assistant-area">
            <div class="workbench-card chat-card">
                <div class="card-header">
                    <div class="chat-header-left">
                        <button id="toggleHistoryBtn" class="menu-btn" title="历史记录">☰</button>
                        <span>🤖 智能法律助手</span>
                    </div>
                    <button id="newChatBtn" class="new-chat-btn" title="新对话">➕</button>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="chat-message assistant">
                        <div class="message-content markdown-body">你好！我是青朗法治智能助手，可以回答涉外案件相关的法律问题。请问有什么可以帮助你的？</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="输入法律问题..." autocomplete="off" />
                    <button id="sendChatBtn">发送</button>
                </div>
                <div id="chatStatus" class="chat-status">● 离线</div>
            </div>
        </div>
    </div>
</div>

<!-- 历史记录侧边栏 -->
<div id="historySidebar" class="history-sidebar">
    <div class="sidebar-header">
        <span>📜 对话历史</span>
        <button id="closeHistoryBtn" class="close-btn">&times;</button>
    </div>
    <div class="sidebar-content" id="historyList">
        <div class="loading-placeholder">加载中...</div>
    </div>
</div>
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<!-- 全屏弹窗 -->
<div id="fullscreenModal" class="fullscreen-modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">全屏数据分析面板</span>
            <button id="closeFullscreenModalBtn" class="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body" id="comparisonModalBody">
            <!-- 地区选择行 -->
            <div class="comparison-select-row">
                <div class="select-group">
                    <label>地区 A</label>
                    <select id="provinceASelect" class="province-select">
                        <option value="">-- 请选择 --</option>
                    </select>
                </div>
                <div class="vs-divider">VS</div>
                <div class="select-group">
                    <label>地区 B</label>
                    <select id="provinceBSelect" class="province-select">
                        <option value="">-- 请选择 --</option>
                    </select>
                </div>
                <button id="compareBtn" class="compare-btn">开始对比</button>
            </div>

            <!-- 筛选栏（初始隐藏，选择地区后显示） -->
            <div id="filterBar" class="filter-bar" style="display: none;">
                <div class="filter-group">
                    <label>📅 年份</label>
                    <select id="yearFilter" class="filter-select">
                        <option value="">全部年份</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📂 案件类型</label>
                    <select id="typeFilter" class="filter-select">
                        <option value="">全部类型</option>
                        <option value="刑事">刑事</option>
                        <option value="民事">民事</option>
                        <option value="行政">行政</option>
                        <option value="公益诉讼">公益诉讼</option>
                    </select>
                </div>
                <button id="applyFilterBtn" class="apply-filter-btn">筛选</button>
                <button id="resetFilterBtn" class="reset-filter-btn">重置</button>
            </div>

            <!-- 案件详情列表容器（初始隐藏） -->
            <div id="caseListContainer" class="case-list-container" style="display: none;">
                <div class="list-header">
                    <span class="back-to-chart-btn" id="backToChartBtn">← 返回图表对比</span>
                    <span class="list-title">案件详情列表</span>
                </div>
                <div id="caseListContent" class="case-list-content"></div>
            </div>

            <!-- 对比内容区域（初始隐藏） -->
            <div id="comparisonResult" style="display: none;">
                <!-- 核心指标卡片 -->
                <div class="kpi-cards-row">
                    <div class="kpi-card" id="kpiA">
                        <div class="kpi-title" id="provinceAName">地区A</div>
                        <div class="kpi-grid">
                            <div class="kpi-item"><span>案件总数</span><strong id="aTotalCases">0</strong></div>
                            <div class="kpi-item"><span>卷宗页数</span><strong id="aTotalPages">0</strong></div>
                            <div class="kpi-item"><span>监督线索</span><strong id="aSupervision">0</strong></div>
                            <div class="kpi-item"><span>风险评分</span><strong id="aRiskScore">0</strong></div>
                        </div>
                    </div>
                    <div class="kpi-card" id="kpiB">
                        <div class="kpi-title" id="provinceBName">地区B</div>
                        <div class="kpi-grid">
                            <div class="kpi-item"><span>案件总数</span><strong id="bTotalCases">0</strong></div>
                            <div class="kpi-item"><span>卷宗页数</span><strong id="bTotalPages">0</strong></div>
                            <div class="kpi-item"><span>监督线索</span><strong id="bSupervision">0</strong></div>
                            <div class="kpi-item"><span>风险评分</span><strong id="bRiskScore">0</strong></div>
                        </div>
                    </div>
                </div>

                <!-- 图表区域（两列布局） -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-title">📊 案件类型分布</div>
                        <div id="typeChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">📌 监督场景 Top 5</div>
                        <div id="reasonChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">🌍 当事人国籍 Top 5</div>
                        <div id="nationalityChart" class="chart-container"></div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">⚖️ 案件年份</div>
                        <div id="lawChart" class="chart-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
