<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青朗法治 - 统一认证</title>
    <!-- 引入独立样式文件 -->
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>
<div class="auth-card">
    <!-- 登录面板 -->
    <div id="loginPanel">
        <h2>系统登录</h2>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginId" placeholder="用户名/邮箱/手机号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码">
        </div>
        <button class="btn btn-login" id="loginBtn">登 录</button>
        <div class="switch-link">
            还没有账号？ <a id="switchToRegister">立即注册</a>
        </div>
        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- 注册面板 (默认隐藏) -->
    <div id="registerPanel" class="hidden">
        <h2>新用户注册</h2>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="regUser" placeholder="字母或数字">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" placeholder="example@qq.com">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" id="regPhone" placeholder="138xxxxxxxx">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPwd" placeholder="设置你的密码">
        </div>
        <button class="btn btn-register" id="registerBtn">注 册</button>
        <div class="switch-link">
            已有账号？ <a id="switchToLogin">返回登录</a>
        </div>
        <div id="regMsg" class="msg"></div>
    </div>
</div>

<!-- 引入独立脚本文件 -->
<script th:src="@{/js/index.js}"></script>
</body>
</html>
